<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0b14" />
    <meta name="description" content="VisionHire — Smart Online Assessment & Recruitment Platform" />
    <title>VisionHire</title>

    <!-- Prevent caching for assessment security -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicon placeholder -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>" />

    <style>
      /* Prevent flash of unstyled content */
      body { background-color: #0a0b14; }

      /* Block print during assessment */
      @media print {
        body { display: none !important; }
      }
    </style>
  </head>
  <body>
    <noscript>VisionHire requires JavaScript to be enabled.</noscript>
    <div id="root"></div>
  </body>
</html>
