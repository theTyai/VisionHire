version: '3.8'

services:
  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: visionhire-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - visionhire-net

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionhire-backend
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visionhire-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Evaluation Worker ────────────────────────────────────
  worker-evaluation:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: visionhire-worker-eval
    command: node src/workers/evaluationWorker.js
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - QUEUE_CONCURRENCY=10
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visionhire-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M

  # ─── Auto-Submit Worker ───────────────────────────────────
  worker-autosubmit:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: visionhire-worker-autosubmit
    command: node src/workers/autoSubmitWorker.js
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visionhire-net

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: visionhire-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - visionhire-net

  # ─── Frontend Builder ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
        - REACT_APP_SOCKET_URL=
    container_name: visionhire-frontend-build
    volumes:
      - frontend-build:/app/build
    networks:
      - visionhire-net

networks:
  visionhire-net:
    driver: bridge

volumes:
  redis-data:
  frontend-build:
